<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rapport d'opération</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{
    --paper:#F1ECDD;
    --card:#E8E0CB;
    --ink:#2B3430;
    --ink-soft:#5B6259;
    --sienna:#BD5B36;
    --slate:#4C6B7A;
    --sage:#7C8F6B;
    --ochre:#C99A3D;
    --line:#D9CBA8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
  }
  .mono { font-family: 'IBM Plex Mono', 'SFMono-Regular', Consolas, monospace; }

  #app { padding: 14px 16px 18px; min-height: 100vh; }

  header.fiche {
    border-bottom: 2px solid var(--ink);
    padding-bottom: 8px;
    margin-bottom: 14px;
  }
  header.fiche .ref {
    font-size: 11px;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  header.fiche h1 {
    margin: 2px 0 0;
    font-size: 19px;
    font-weight: 650;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 12px 8px;
  }
  .card h2 {
    margin: 0 0 8px;
    font-size: 12px;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .card .chart-box { position: relative; height: 220px; }
  .card .note {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 6px;
  }

  #empty {
    text-align: center;
    padding: 48px 12px;
    color: var(--ink-soft);
    font-size: 13px;
  }
  #empty .mono { display:block; margin-top: 6px; font-size: 11px; }

  .hidden { display: none !important; }
</style>
</head>
<body>
<div id="app">

  <header class="fiche" id="header">
    <div class="ref mono" id="refLine">RÉF. — </div>
    <h1 id="titre">Sélectionnez une ligne</h1>
  </header>

  <div class="grid" id="grid">
    <section class="card">
      <h2>Nombre de logements dans les opérations</h2>
      <div class="chart-box"><canvas id="chartIndicateurs"></canvas></div>
      <div class="note" id="noteIndicateurs"></div>
    </section>

    <section class="card">
      <h2>L'état de blocage des logements en cours</h2>
      <div class="chart-box"><canvas id="chartBlocage"></canvas></div>
      <div class="note" id="noteBlocage"></div>
    </section>
  </div>

  <div id="empty" class="hidden">
    Aucune ligne sélectionnée.
    <span class="mono">Cliquez une ligne dans le tableau lié à ce widget.</span>
  </div>

</div>

<script>
if (window.ChartDataLabels) { Chart.register(window.ChartDataLabels); }

/* ---------------------------------------------------------------
   Colonnes attendues. À mapper dans Grist : 3 points du widget
   > "Sélectionner les colonnes source" (panneau de droite).
   Tout est lu UNIQUEMENT depuis la ligne sélectionnée (onRecord) —
   peu importe que cette ligne vienne de votre table principale ou
   de votre table résumée (group by), tant que le widget est bien
   lié (Select By) sur la bonne source.
   --------------------------------------------------------------- */
grist.ready({
  columns: [
    { name: 'Libelle',   title: 'Libellé (ex : commune + opération)', type: 'Text', optional: true },
    { name: 'Reference', title: 'Référence (ex : n° de parcelle / commune)', type: 'Text', optional: true },

    { name: 'Indicateurs', title: 'Logements : total en cours + les 4 colonnes "dont logements"',
      type: 'Numeric', allowMultiple: true },

    { name: 'StatutsBlocage', title: 'Statuts de blocage (les 6 colonnes : normal, débloqué Task Force, à nouveau bloqué, feuille de route, recours, en difficulté)',
      type: 'Numeric', allowMultiple: true },
  ],
  requiredAccess: 'read table',
});

const PALETTE_BAR = '#4C6B7A';
const PALETTE_PIE = ['#7CB342', '#AED581', '#FB8C00', '#E53935', '#FFEB3B', '#64B5F6', '#8C6A8F', '#C99A3D'];

const charts = {};
function destroy(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
function prettify(colId) { return String(colId || '').replace(/_/g, ' '); }

grist.onRecord((record, mappings) => {
  const mapped = grist.mapColumnNames(record);
  if (!mapped) { showEmpty(); return; }
  hideEmpty();

  document.getElementById('refLine').textContent = 'RÉF. — ' + (mapped.Reference || '—');
  document.getElementById('titre').textContent = mapped.Libelle || 'Opération';

  renderIndicateurs(mapped, mappings);
  renderBlocage(mapped, mappings);
});

function showEmpty() {
  document.getElementById('grid').classList.add('hidden');
  document.getElementById('header').classList.add('hidden');
  document.getElementById('empty').classList.remove('hidden');
}
function hideEmpty() {
  document.getElementById('grid').classList.remove('hidden');
  document.getElementById('header').classList.remove('hidden');
  document.getElementById('empty').classList.add('hidden');
}

function commonOptions() {
  return { responsive: true, maintainAspectRatio: false, animation: { duration: 250 } };
}

/* ---------------- Graphique 1 — logements (barres) ---------------- */
function renderIndicateurs(mapped, mappings) {
  const note = document.getElementById('noteIndicateurs');
  const values = Array.isArray(mapped.Indicateurs) ? mapped.Indicateurs : [];
  const colIds = Array.isArray(mappings && mappings.Indicateurs) ? mappings.Indicateurs : [];

  if (!values.length) {
    note.textContent = 'Mappez "total logements en cours" + vos 4 colonnes "dont logements" dans "Indicateurs".';
    destroy('indicateurs');
    return;
  }
  note.textContent = '';
  const labels = colIds.length === values.length ? colIds.map(prettify) : values.map((_, i) => 'Ind. ' + (i + 1));

  destroy('indicateurs');
  charts.indicateurs = new Chart(document.getElementById('chartIndicateurs'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: PALETTE_BAR, borderRadius: 3 }] },
    options: {
      ...commonOptions(),
      plugins: { legend: { display: false }, datalabels: { display: false } },
      scales: { y: { beginAtZero: true } },
    },
  });
}

/* ---------------- Graphique 2 — état de blocage (pie, façon capture) ---------------- */
function renderBlocage(mapped, mappings) {
  const note = document.getElementById('noteBlocage');
  const values = Array.isArray(mapped.StatutsBlocage) ? mapped.StatutsBlocage : [];
  const colIds = Array.isArray(mappings && mappings.StatutsBlocage) ? mappings.StatutsBlocage : [];

  if (!values.length) {
    note.textContent = 'Mappez vos 6 colonnes de statut de blocage dans "StatutsBlocage".';
    destroy('blocage');
    return;
  }
  note.textContent = '';
  const labels = colIds.length === values.length ? colIds.map(prettify) : values.map((_, i) => 'Statut ' + (i + 1));

  destroy('blocage');
  charts.blocage = new Chart(document.getElementById('chartBlocage'), {
    type: 'pie',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: PALETTE_PIE.slice(0, values.length) }],
    },
    options: {
      ...commonOptions(),
      plugins: {
        legend: { display: true, position: 'right', labels: { boxWidth: 10, font: { size: 10 } } },
        datalabels: {
          color: '#2B3430',
          font: { size: 11, weight: '600' },
          formatter: (v) => v,
        },
      },
    },
  });
}
</script>
</body>
</html>
