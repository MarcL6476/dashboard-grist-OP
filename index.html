<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rapport d'opération</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{
    --paper:#F1ECDD;
    --card:#E8E0CB;
    --ink:#2B3430;
    --ink-soft:#5B6259;
    --sage:#7C8F6B;
    --line:#D9CBA8;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--paper); color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif; }
  .mono { font-family:'IBM Plex Mono','SFMono-Regular',Consolas,monospace; }
  #app { padding:14px 16px 18px; min-height:100vh; }

  header.fiche { border-bottom:2px solid var(--ink); padding-bottom:8px; margin-bottom:14px; }
  header.fiche .ref { font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-soft); }
  header.fiche h1 { margin:2px 0 0; font-size:19px; font-weight:650; }

  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:3px; padding:10px 12px 8px; }
  .card h2 { margin:0 0 8px; font-size:12px; letter-spacing:.04em; text-transform:uppercase;
    color:var(--ink-soft); font-weight:600; }
  .card .chart-box { position:relative; height:220px; }
  .card .note { font-size:11px; color:var(--ink-soft); margin-top:6px; }

  /* Tableau années */
  .tbl { width:100%; border-collapse:collapse; font-size:12px; margin-top:12px; }
  .tbl th { background:var(--card); text-transform:uppercase; font-size:10px;
    letter-spacing:.04em; color:var(--ink-soft); padding:4px 8px;
    border-bottom:1px solid var(--line); text-align:center; width:33%; }
  .tbl td { padding:4px 8px; border-bottom:1px solid var(--line); text-align:center; width:33%; }

  /* Badges bas */
  .badges { display:flex; gap:6px; flex-wrap:wrap; flex-direction:column; }
  .badge { font-size:11px; font-weight:600; padding:3px 10px; border-radius:12px;
    border:1px solid var(--line); background:var(--card); color:var(--ink-soft); }
  .badge.on { background:var(--sage); border-color:var(--sage); color:#fff; }

  #empty { text-align:center; padding:48px 12px; color:var(--ink-soft); font-size:13px; }
  #empty .mono { display:block; margin-top:6px; font-size:11px; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="app">

  <header class="fiche" id="header">
    <div class="ref mono" id="majLine">Dernière mise à jour — </div>
    <h1 id="titre">Sélectionnez une ligne</h1>
  </header>

  <div class="grid" id="grid">
    <section class="card">
      <h2>Nombre de logements dans les opérations</h2>
      <div class="chart-box"><canvas id="chartIndicateurs"></canvas></div>
      <div class="note" id="noteIndicateurs"></div>
    </section>

    <section class="card">
      <h2>L'état de blocage des logements en cours</h2>
      <div class="note" id="noteNbOps" style="margin-top:0;margin-bottom:6px;font-weight:600;color:var(--ink);"></div>
      <div class="chart-box"><canvas id="chartBlocage"></canvas></div>
      <div class="note" id="noteBlocage"></div>
    </section>
  </div>

  <div style="display:flex;gap:16px;align-items:flex-start;margin-top:14px;">
    <div id="tableauAnnees" style="flex:1;min-width:0;"></div>
    <div class="badges" id="badges" style="flex:1;min-width:0;flex-direction:column;align-items:flex-start;margin-top:0;"></div>
  </div>

  <div id="empty" class="hidden">
    Aucune ligne sélectionnée.
    <span class="mono">Cliquez une ligne dans le tableau lié à ce widget.</span>
  </div>

</div>
<script>
if (window.ChartDataLabels) { Chart.register(window.ChartDataLabels); }

grist.ready({
  columns: [
    { name: 'Libelle',          title: 'Libellé (commune + opération)',                   type: 'Text',    optional: true },
    { name: 'DerniereMaJ',      title: 'Date de dernière mise à jour',                    type: 'DateTime',optional: true },
    { name: 'NbOperations',     title: "Nombre d'opérations en cours",                    type: 'Numeric', optional: true },
    { name: 'AnneesLivraison',    title: 'Années prévisionnelles de livraison (liste)',         type: 'Any', optional: true },
    { name: 'AnneesLancement',    title: 'Années prévisionnelles de lancement travaux (liste)',  type: 'Any', optional: true },
    { name: 'LogementsLivraison', title: 'Logements par année de livraison (liste)',             type: 'Any', optional: true },
    { name: 'LogementsLancement', title: 'Logements par année de lancement (liste)',             type: 'Any', optional: true },
    { name: 'FondFriche',       title: 'Fond friche (€)',                                 type: 'Any',     optional: true },
    { name: 'AMB',              title: 'AMB (€)',                                         type: 'Any',     optional: true },
    { name: 'TEL',              title: 'TEL (€)',                                         type: 'Any',     optional: true },
    { name: 'FinEtat',          title: 'Financement Etat hors droit commun (€)',          type: 'Any',     optional: true },
    { name: 'FinCAPB',          title: 'Financement CAPB hors droit commun (€)',          type: 'Any',     optional: true },
    { name: 'FinCD64',          title: 'Financement CD64 hors droit commun (€)',          type: 'Any',     optional: true },
    { name: 'FinCommune',       title: 'Financement commune hors droit commun (€)',       type: 'Any',     optional: true },
    { name: 'Indicateurs',      title: 'Logements : total en cours + 4 colonnes "dont logements"',
      type: 'Numeric', allowMultiple: true },
    { name: 'StatutsBlocage',   title: 'Statuts de blocage (6 colonnes)',
      type: 'Numeric', allowMultiple: true },
  ],
  requiredAccess: 'read table',
});

const PALETTE_BAR = '#4C6B7A';
const PALETTE_PIE = ['#7CB342','#AED581','#FB8C00','#E53935','#FFEB3B','#64B5F6','#8C6A8F','#C99A3D'];
const charts = {};

function destroy(id) { if (charts[id]) { charts[id].destroy(); delete charts[id]; } }
function prettify(c) {
  try { return decodeURIComponent(String(c||'').replace(/_/g,' ')); }
  catch(e) { return String(c||'').replace(/_/g,' '); }
}

function formatDate(v) {
  if (typeof v === 'number') return new Date(v*1000).toLocaleDateString('fr-FR');
  if (v instanceof Date)     return v.toLocaleDateString('fr-FR');
  if (typeof v === 'string' && v.trim()) { const d=new Date(v); return isNaN(d)?v:d.toLocaleDateString('fr-FR'); }
  return '—';
}

function formatEuro(v) {
  if (typeof v === 'number') return v.toLocaleString('fr-FR') + ' €';
  if (v === true) return 'oui';
  if (v === false || v == null) return '0 €';
  return v;
}

function isTruthy(v) {
  if (v === true) return true;
  if (typeof v === 'number') return v !== 0;
  if (typeof v === 'string') return ['oui','true','x','1','yes'].includes(v.trim().toLowerCase());
  return false;
}

grist.onRecord((record, mappings) => {
  const m = grist.mapColumnNames(record);
  if (!m) { showEmpty(); return; }
  hideEmpty();
  document.getElementById('majLine').textContent = 'Dernière mise à jour — ' + formatDate(m.DerniereMaJ);
  document.getElementById('titre').textContent   = m.Libelle || 'Opération';
  renderIndicateurs(m, mappings);
  renderBlocage(m, mappings);
  renderNbOps(m);
  renderTableauAnnees(m);
  renderBadges(m);
});

/* ---- Badges bas ---- */
function renderBadges(m) {
  const items = [
    { label:'Fond friche', val:m.FondFriche },
    { label:'AMB',         val:m.AMB },
    { label:'TEL',         val:m.TEL },
    { label:'Fin. État h.d.c.',    val:m.FinEtat },
    { label:'Fin. CAPB h.d.c.',   val:m.FinCAPB },
    { label:'Fin. CD64 h.d.c.',   val:m.FinCD64 },
    { label:'Fin. Commune h.d.c.',val:m.FinCommune },
  ];
  document.getElementById('badges').innerHTML = items
    .map(i=>`<span class="badge ${isTruthy(i.val)?'on':''}">${i.label} : ${formatEuro(i.val)}</span>`)
    .join('');
}

/* ---- Compteur opérations ---- */
function renderNbOps(m) {
  const el = document.getElementById('noteNbOps');
  const n = m.NbOperations;
  el.textContent = typeof n==='number'
    ? n.toLocaleString('fr-FR') + ' opération' + (n>1?'s':'') + ' en cours'
    : '';
}

/* ---- Tableau années ---- */
function renderTableauAnnees(m) {
  const el  = document.getElementById('tableauAnnees');

  // Zip années + logements pour sommer
  function buildData(years, logs) {
    const ops = {}, lgs = {};
    const yList = Array.isArray(years) ? years : [];
    const lList = Array.isArray(logs)  ? logs  : [];
    yList.forEach((y, i) => {
      if (y == null || y === '') return;
      const k = String(y);
      ops[k] = (ops[k] || 0) + 1;
      lgs[k] = (lgs[k] || 0) + (Number(lList[i]) || 0);
    });
    return { ops, lgs };
  }

  const lan = buildData(m.AnneesLancement,  m.LogementsLancement);
  const liv = buildData(m.AnneesLivraison,  m.LogementsLivraison);
  const years = [...new Set([...Object.keys(lan.ops),...Object.keys(liv.ops)])].sort();
  if (!years.length) { el.innerHTML=''; return; }

  const rows = years.map(y=>`
    <tr>
      <td>${y}</td>
      <td>${lan.ops[y]||0} op. / ${lan.lgs[y]||0} log.</td>
      <td>${liv.ops[y]||0} op. / ${liv.lgs[y]||0} log.</td>
    </tr>`).join('');

  el.innerHTML = `
    <table class="tbl">
      <thead><tr>
        <th>Année</th>
        <th>Lancement travaux</th>
        <th>Livraison</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

/* ---- Graphique 1 — logements (barres + tick connecteur) ---- */
function renderIndicateurs(m, mappings) {
  const note   = document.getElementById('noteIndicateurs');
  const values = Array.isArray(m.Indicateurs) ? m.Indicateurs : [];
  const colIds = Array.isArray(mappings&&mappings.Indicateurs) ? mappings.Indicateurs : [];
  if (!values.length) {
    note.textContent = 'Mappez vos colonnes logements dans "Indicateurs".';
    destroy('indicateurs'); return;
  }
  note.textContent = '';
  const labels = colIds.length===values.length ? colIds.map(prettify) : values.map((_,i)=>'Ind.'+(i+1));
  destroy('indicateurs');
  charts.indicateurs = new Chart(document.getElementById('chartIndicateurs'), {
    type: 'bar',
    data: { labels, datasets:[{ data:values, backgroundColor:PALETTE_BAR, borderRadius:3 }] },
    options: {
      responsive:true, maintainAspectRatio:false, animation:{duration:250},
      plugins:{ legend:{display:false}, datalabels:{display:false} },
      scales:{
        x:{
          ticks:{
            maxRotation:45, minRotation:45,
            callback: function(val,i) { return labels[i]; }
          },
          grid:{ drawTicks:true, tickLength:8, tickColor:'#5B6259' }
        },
        y:{ beginAtZero:true }
      },
      layout:{ padding:{ bottom:8 } }
    },
  });
}

/* ---- Graphique 2 — blocage (pie) ---- */
function renderBlocage(m, mappings) {
  const note   = document.getElementById('noteBlocage');
  const values = Array.isArray(m.StatutsBlocage) ? m.StatutsBlocage : [];
  const colIds = Array.isArray(mappings&&mappings.StatutsBlocage) ? mappings.StatutsBlocage : [];
  if (!values.length) {
    note.textContent = 'Mappez vos colonnes de blocage dans "StatutsBlocage".';
    destroy('blocage'); return;
  }
  note.textContent = '';
  const labels = colIds.length===values.length ? colIds.map(prettify) : values.map((_,i)=>'Statut '+(i+1));
  destroy('blocage');
  charts.blocage = new Chart(document.getElementById('chartBlocage'), {
    type: 'pie',
    data: { labels, datasets:[{ data:values, backgroundColor:PALETTE_PIE.slice(0,values.length) }] },
    options: {
      responsive:true, maintainAspectRatio:false, animation:{duration:250},
      plugins:{
        legend:{ display:true, position:'right', labels:{ boxWidth:14, font:{size:15}, padding:10 } },
        datalabels:{
          color:'#2B3430',
          font:{ size:11, weight:'600' },
          formatter:(v)=> v===0 ? '' : v,
        },
      },
    },
  });
}

function showEmpty() {
  document.getElementById('grid').classList.add('hidden');
  document.getElementById('header').classList.add('hidden');
  document.getElementById('empty').classList.remove('hidden');
}
function hideEmpty() {
  document.getElementById('grid').classList.remove('hidden');
  document.getElementById('header').classList.remove('hidden');
  document.getElementById('empty').classList.add('hidden');
}
</script>
</body>
</html>
